<div class="w-full h-full flex items-center justify-center p-4">

  <div class="cover-frame w-full max-w-[390px] h-[88svh] flex flex-col items-center justify-between py-10 px-7">

    <!-- Top ornament -->
    <div class="z-10 text-center space-y-2 pt-6 reveal">
      <div class="flex items-center justify-center gap-3">
        <div class="h-px w-10 bg-[#1a1f1c]/15"></div>
        <span class="font-hand text-[#52936e]/70 text-2xl">✦</span>
        <div class="h-px w-10 bg-[#1a1f1c]/15"></div>
      </div>
      <p class="font-cinzel text-[10px] font-bold tracking-[0.5em] uppercase text-[#5a6660] pt-2">Tueng Dara Baro</p>
    </div>

    <!-- Names -->
    <div class="z-10 text-center space-y-2 my-auto reveal reveal-delay-1">
      <div class="h-px w-20 bg-[#52936e]/25 mx-auto mb-3"></div>
      <h1 class="font-cinzel text-[38px] font-bold tracking-[0.18em] text-[#1a1f1c] leading-none">FAHMI</h1>
      <p class="font-hand text-[54px] text-[#52936e]/50 leading-none py-1">&amp;</p>
      <h1 class="font-cinzel text-[38px] font-bold tracking-[0.18em] text-[#1a1f1c] leading-none">UTIA</h1>
      <div class="h-px w-20 bg-[#52936e]/25 mx-auto mt-3"></div>
      <div class="flex items-center justify-center gap-2 pt-2 opacity-40">
        <span class="text-[#52936e] text-[11px]">✦</span>
        <span class="text-[#2d6a4f] text-[9px]">◆</span>
        <span class="text-[#52936e] text-[11px]">✦</span>
      </div>
      <p class="font-inter text-[12px] text-[#5a6660] tracking-[0.22em] uppercase font-medium pt-3">Minggu, 19 Juli 2026</p>
    </div>

    <!-- Guest + open button -->
    <div class="z-10 w-full space-y-3.5 border-t border-dashed border-[#52936e]/30 pt-5 reveal reveal-delay-2">
      <p class="text-center font-inter text-[11px] text-[#5a6660] tracking-[0.2em] uppercase">
        Kepada Yth. Bapak/Ibu/Saudara/i
      </p>
      <div class="bg-[#2d6a4f] rounded-full py-2.5 px-5 text-center shadow-sm">
        <span id="guestName" class="font-inter text-[14px] text-white font-semibold tracking-wide">Tamu Undangan</span>
      </div>
      <button id="openInvitationBtn"
        class="w-full flex items-center justify-center gap-2 bg-transparent
               border border-[#52936e]/50 hover:bg-[#2d6a4f] hover:border-[#2d6a4f] hover:text-white
               text-[#1a1f1c] font-cinzel text-[11px] font-bold tracking-[0.22em] uppercase
               py-3 px-6 rounded-full transition-all duration-300 active:scale-95 group">
        <i class="fa-regular fa-envelope-open text-xs transition-transform duration-300 group-hover:rotate-12"></i>
        Buka Undangan
      </button>
    </div>

  </div>
</div>
