<section id="section-wishes" class="py-14 px-5 bg-white border-t border-[#c8dfd7]">

  <!-- Title -->
  <div class="text-center space-y-1.5 mb-6 reveal">
    <h2 class="font-playfair text-[22px] font-bold text-[#1a1f1c]">Ucapan &amp; Do'a</h2>
    <div class="h-px w-10 bg-[#c8dfd7] mx-auto"></div>
  </div>

  <!-- Form card -->
  <div class="bg-[#f7faf8] border border-[#c8dfd7] rounded-2xl p-5 mb-6 reveal">
    <form id="wishesForm" class="space-y-3">
      <div>
        <label for="wishName"
          class="block font-cinzel text-[9px] font-bold text-[#5a6660] uppercase tracking-widest mb-1.5">
          Nama Anda
        </label>
        <input type="text" id="wishName" name="wishName" required maxlength="80" autocomplete="name"
          class="w-full bg-white border border-[#c8dfd7] rounded-xl px-4 py-3 text-[13px] text-[#1a1f1c]
                 placeholder:text-[#1a1f1c]/25 focus:outline-none focus:ring-2 focus:ring-[#52936e]/30
                 font-inter transition"
          placeholder="Nama lengkap Anda...">
      </div>
      <div>
        <label for="wishMessage"
          class="block font-cinzel text-[9px] font-bold text-[#5a6660] uppercase tracking-widest mb-1.5">
          Ucapan / Do'a
        </label>
        <textarea id="wishMessage" name="wishMessage" required rows="3" maxlength="500"
          class="w-full bg-white border border-[#c8dfd7] rounded-xl px-4 py-3 text-[13px] text-[#1a1f1c]
                 placeholder:text-[#1a1f1c]/25 focus:outline-none focus:ring-2 focus:ring-[#52936e]/30
                 font-inter transition resize-none"
          placeholder="Tulis ucapan &amp; do'a untuk mempelai..."></textarea>
      </div>
      <button type="submit" id="btnSubmitWish"
        class="w-full bg-[#2d6a4f] hover:bg-[#245c43] text-white font-cinzel text-[10px]
               font-bold uppercase tracking-widest py-3 rounded-xl transition-all active:scale-95
               flex items-center justify-center gap-2">
        <i class="fa-regular fa-paper-plane text-xs"></i> Kirim Ucapan
      </button>
    </form>
  </div>

  <!-- List header -->
  <div class="flex items-center justify-between mb-3 reveal">
    <h4 class="font-playfair text-[14px] font-bold text-[#1a1f1c] flex items-center gap-2">
      <i class="fa-regular fa-comments text-[#52936e] text-sm"></i>
      <span id="wishesCount">0</span> Ucapan Restu
    </h4>
    <span class="flex items-center gap-1.5 text-[9px] text-[#5a6660] font-cinzel font-bold uppercase tracking-wider">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>Live
    </span>
  </div>

  <!-- Scrollable list box — fixed height, border, rounded -->
  <div class="border border-[#c8dfd7] rounded-2xl bg-[#f7faf8] overflow-hidden reveal">
    <div id="wishesList" class="wishes-list-container p-3">
      <div id="loadingWishes" class="wishes-empty">
        <i class="fa-solid fa-spinner animate-spin text-lg mb-2 block opacity-30"></i>
        Memuat ucapan...
      </div>
    </div>
  </div>

</section>
